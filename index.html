<!doctype html>
<html>
<head>
<meta charset="UTF-8" />
<title>dashboard</title>

<style>
body {
    background: radial-gradient(circle at top, #0a0a0a, #000);
    color: #0ff;
    font-family: 'Segoe UI', sans-serif;
    margin: 0;
    padding: 10px;

    display: grid;
    grid-template-rows: auto auto 1fr auto;
    gap: 10px;
    height: 100vh;
}

.panel {
    background: rgba(20,20,20,0.7);
    border-radius: 10px;
    padding: 10px;
    box-shadow: 0 0 15px rgba(0,255,255,0.1);
}

/* Neon button styles */
button {
    background: linear-gradient(135deg, #0a2a2a, #0f4040);
    border: 1px solid #0ff;
    color: #0ff;
    padding: 8px 16px;
    border-radius: 5px;
    cursor: pointer;
    font-family: inherit;
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: all 0.3s ease;
    box-shadow: 0 0 5px rgba(0,255,255,0.3);
}

button:hover {
    background: linear-gradient(135deg, #0f4040, #1a6060);
    box-shadow: 0 0 15px rgba(0,255,255,0.6);
    transform: translateY(-1px);
}

button:active {
    transform: translateY(1px);
    box-shadow: 0 0 8px rgba(0,255,255,0.8);
}

/* Neon select styles */
select, input[type="datetime-local"] {
    background: linear-gradient(135deg, #0a1a1a, #0f3030);
    border: 1px solid #0ff;
    color: #0ff;
    padding: 6px 10px;
    border-radius: 5px;
    font-family: inherit;
    font-size: 13px;
    cursor: pointer;
    outline: none;
    transition: all 0.3s ease;
    box-shadow: 0 0 5px rgba(0,255,255,0.2);
}

select:hover, input[type="datetime-local"]:hover {
    box-shadow: 0 0 10px rgba(0,255,255,0.5);
}

select:focus, input[type="datetime-local"]:focus {
    border-color: #0ff;
    box-shadow: 0 0 15px rgba(0,255,255,0.6);
}

/* Option styling */
select option {
    background: #0a1a1a;
    color: #0ff;
    padding: 5px;
}

/* Checkbox styling */
input[type="checkbox"] {
    appearance: none;
    width: 16px;
    height: 16px;
    background: #0a1a1a;
    border: 1px solid #0ff;
    border-radius: 3px;
    cursor: pointer;
    position: relative;
    vertical-align: middle;
    margin-right: 5px;
    transition: all 0.2s ease;
}

input[type="checkbox"]:checked {
    background: #0ff;
    box-shadow: 0 0 8px rgba(0,255,255,0.8);
}

input[type="checkbox"]:checked::after {
    content: '✓';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #000;
    font-size: 12px;
    font-weight: bold;
}

/* Range input styling */
input[type="range"] {
    -webkit-appearance: none;
    width: 150px;
    height: 6px;
    background: linear-gradient(90deg, #0a2a2a, #0f4040);
    border-radius: 3px;
    outline: none;
    border: 1px solid #0ff;
}

input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px;
    height: 16px;
    background: #0ff;
    border-radius: 50%;
    cursor: pointer;
    box-shadow: 0 0 10px rgba(0,255,255,0.8);
}

input[type="range"]::-moz-range-thumb {
    width: 16px;
    height: 16px;
    background: #0ff;
    border-radius: 50%;
    cursor: pointer;
    border: none;
    box-shadow: 0 0 10px rgba(0,255,255,0.8);
}

/* Sensor labels */
#sensorList label {
    display: inline-block;
    margin: 3px 8px 3px 0;
    padding: 4px 8px;
    background: rgba(0,255,255,0.05);
    border-radius: 4px;
    border: 1px solid rgba(0,255,255,0.2);
    transition: all 0.2s ease;
}

#sensorList label:hover {
    background: rgba(0,255,255,0.1);
    border-color: #0ff;
}

/* Custom range inputs */
#customRange {
    margin-top: 8px;
    padding: 8px;
    background: rgba(0,255,255,0.05);
    border-radius: 5px;
}

#customRange label {
    display: block;
    margin: 5px 0;
    color: #0ff;
}

#customRange input {
    width: 180px;
}

@media (max-width: 800px) {
    body {
        grid-template-rows: auto auto auto 1fr auto;
    }

    #chartContainer {
        height: 40vh;
    }
}

#chartContainer {
    height: 100%;
    min-height: 300px;
}
</style>

</head>
<body>

<h1>⚡ SENSOR CORE</h1>
<h2 id="currentTemp">-- °C</h2>

<div class="panel controls">

    <div>
        <b>Sensors</b>
        <div id="sensorList"></div>
    </div>

    <div>
        <b>Display</b>
        <label><input type="checkbox" id="showRaw" checked> Raw</label>
        <label><input type="checkbox" id="showSmooth" checked> Smooth</label>
        <label><input type="checkbox" id="showAvg"> Avg</label>
    </div>

    <div>
        <b>Chart Type</b>
        <select id="chartType">
            <option value="line">Line</option>
            <option value="bar">Bar</option>
            <option value="doughnut">Doughnut</option>
            <option value="pie">Pie</option>
        </select>
    </div>

    <div>
        <b>Period</b>
        <select id="period">
            <option value="1h">Last Hour</option>
            <option value="6h">Last 6 Hours</option>
            <option value="24h" selected>Last 24 Hours</option>
            <option value="7d">Last 7 Days</option>
            <option value="30d">Last 30 Days</option>
            <option value="custom">Custom Range</option>
        </select>
        <div id="customRange" style="display: none;">
            <label>From: <input type="datetime-local" id="dateFrom"></label>
            <label>To: <input type="datetime-local" id="dateTo"></label>
        </div>
    </div>

    <div>
        <b>Resolution</b>
        <select id="resolution">
            <option value="0">Raw</option>
            <option value="1">1 min</option>
            <option value="2">2 min</option>
            <option value="5">5 min</option>
            <option value="10">10 min</option>
        </select>
    </div>

</div>

<div class="panel">
    <label>UI Scale</label>
    <input type="range" id="uiScale" min="0.7" max="1.5" step="0.1" value="1">
</div>

<div class="panel">
    <button id="load">Load</button>
</div>

<div class="panel">
    <button id="load">Load</button>
    <button id="resetZoom">Reset Zoom</button>
</div>

<div class="panel" id="chartContainer">
    <canvas id="chart"></canvas>
</div>

<div class="panel" id="pieChartContainer" style="display: none;">
    <canvas id="pieChart"></canvas>
</div>

<div class="panel" id="stats">
    <div id="statsText"></div>
</div>

<script type="module" src="/src/main.js"></script>

</body>
</html>
